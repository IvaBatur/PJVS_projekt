<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WatchUp | Dodaj Sat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="main-card">
        <h2 class="text-center mb-4" style="color: #2d3436; font-weight: 700;">Novi Sat</h2>
        
        <form th:action="@{/spremi}" th:object="${sat}" method="post">
            <div class="mb-3">
                <label class="form-label">Brend:</label>
                <select th:field="*{brand}" class="form-select" required>
                    <option value="">-- Odaberi Brend --</option>
                    <option th:each="b : ${brandovi}"
                            th:value="${b.id}"
                            th:text="${b.naziv}"></option>
                </select>
            </div>

        <div class="mb-3">
    <label class="form-label">Model:</label>
    <input type="text" th:field="*{model}" th:errorclass="is-invalid" class="form-control" placeholder="npr. SRPJ39K1" required>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></div>
        </div>

        <div class="mb-3">
    <label class="form-label">Cijena (€):</label>
    <input type="number" step="0.01" th:field="*{cijena}" th:errorclass="is-invalid" class="form-control" placeholder="0.00" required>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('cijena')}" th:errors="*{cijena}"></div>
        </div>

        <div class="mb-3">
    <label class="form-label">Količina:</label>
    <input type="number" th:field="*{kolicina}" th:errorclass="is-invalid" class="form-control" placeholder="1" required>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('kolicina')}" th:errors="*{kolicina}"></div>
    </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                <a href="/" class="btn btn-secondary btn-custom me-md-2">Odustani</a>
                <button type="submit" class="btn btn-primary btn-custom">Spremi Sat</button>
            </div>
        </form>
    </div>

</body>
<style>
        body {
            background-image: url('https://img.freepik.com/premium-photo/close-up-black-clock-face-with-number-8-it_1013369-49852.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-card {
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #dee2e6;
        }

        .btn-custom {
            border-radius: 10px;
            padding: 10px 25px;
            font-weight: 600;
            transition: 0.3s;
        }
    </style>
</html>
