<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WatchUp | Uredi Sat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
        body {
            background-image: url('https://img.freepik.com/premium-photo/close-up-black-clock-face-with-number-8-it_1013369-49852.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
</style>
<body class="bg-light p-5">
    <div class="container card shadow p-4" style="max-width: 600px;">
        <h2 class="mb-4 text-warning">Uredi podatke o satu</h2>
        
        <form th:action="@{/spremi}" th:object="${sat}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Brend:</label>
                <select th:field="*{brand}" class="form-select" required>
                    <option th:each="b : ${brandovi}" th:value="${b.id}" th:text="${b.naziv}"></option>
                </select>
            </div>

            <div class="mb-3">
    <label class="form-label">Model:</label>
    <input type="text" th:field="*{model}" th:errorclass="is-invalid" class="form-control" required>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></div>
        </div>

        <div class="mb-3">
    <label class="form-label">Cijena (€):</label>
    <input type="number" step="0.01" th:field="*{cijena}" th:errorclass="is-invalid" class="form-control" required>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('cijena')}" th:errors="*{cijena}"></div>
        </div>

        <div class="mb-3">
    <label class="form-label">Količina:</label>
    <input type="number" th:field="*{kolicina}" th:errorclass="is-invalid" class="form-control" required>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('kolicina')}" th:errors="*{kolicina}"></div>
</div>

            <div class="mt-4">
                <button type="submit" class="btn btn-warning">Spremi promjene</button>
                <a href="/" class="btn btn-secondary">Odustani</a>
            </div>
        </form>
    </div>
</body>
</html>
